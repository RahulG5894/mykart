services:
  postgres:
    image: postgres:16-alpine
    container_name: mykart-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-Test}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Set DB_PASSWORD in .env}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/main/resources/scripts/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-Test}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mykart-app
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # .env uses localhost for local Gradle runs; inside Compose use the DB service name.
      DB_HOST: postgres
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "${SERVER_PORT:-8089}:${SERVER_PORT:-8089}"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
